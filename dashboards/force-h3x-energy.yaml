title: Force H3X Energy
views:
  - title: Energy
    path: force-h3x-energy
    icon: mdi:battery-charging-70
    cards:
      - type: markdown
        title: Force H3X Energy
        content: >
          **Decision:** {{ states('sensor.h3x_energy_arbitrage_decision') }}

          **Reason:** {{ state_attr('sensor.h3x_energy_arbitrage_decision', 'reason') }}

          **Current price:** {{ states('sensor.h3x_energy_arbitrage_current_price') }}
          {{ state_attr('sensor.h3x_energy_arbitrage_price_plan', 'currency') }}/kWh

          **Estimated value:** {{
          states('sensor.h3x_energy_arbitrage_estimated_savings') }} {{
          state_attr('sensor.h3x_energy_arbitrage_price_plan', 'currency') }}
          over the active optimization horizon.

      - type: grid
        title: Current state
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.h3x_energy_arbitrage_current_price
            name: Current price
            icon: mdi:cash-clock
          - type: tile
            entity: sensor.h3x_energy_arbitrage_decision
            name: Decision
            icon: mdi:state-machine
          - type: tile
            entity: sensor.h3x_energy_arbitrage_target_power
            name: Target power
            icon: mdi:transmission-tower-export
          - type: tile
            entity: sensor.force_h3x_bridge_battery_soc
            name: Battery SOC
            icon: mdi:battery
          - type: tile
            entity: sensor.force_h3x_bridge_battery_power
            name: Battery power
            icon: mdi:battery-charging
          - type: tile
            entity: sensor.force_h3x_bridge_load_power
            name: House load
            icon: mdi:home-lightning-bolt

      - type: grid
        title: Estimated arbitrage value
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.h3x_energy_arbitrage_estimated_savings
            name: Horizon value
            icon: mdi:cash-multiple
          - type: tile
            entity: sensor.h3x_energy_arbitrage_estimated_savings_today
            name: Today's value
            icon: mdi:cash-clock
          - type: tile
            entity: sensor.h3x_energy_arbitrage_first_slot_value
            name: Current slot value
            icon: mdi:clock-fast
          - type: tile
            entity: sensor.h3x_energy_arbitrage_planned_charge_energy
            name: Planned charge
            icon: mdi:battery-plus
          - type: tile
            entity: sensor.h3x_energy_arbitrage_planned_discharge_energy
            name: Planned discharge
            icon: mdi:battery-minus
          - type: tile
            entity: sensor.h3x_energy_arbitrage_price_slots_available
            name: Price slots
            icon: mdi:calendar-clock

      - type: custom:apexcharts-card
        graph_span: 36h
        span:
          start: hour
        now:
          show: true
          label: Now
        header:
          show: true
          title: Dynamic price and dispatch plan
          show_states: true
          colorize_states: true
        yaxis:
          - id: price
            decimals: 3
            apex_config:
              title:
                text: Price/kWh
          - id: power
            opposite: true
            decimals: 1
            apex_config:
              title:
                text: kW
        apex_config:
          chart:
            height: 360
          stroke:
            width: 2
          tooltip:
            shared: true
          legend:
            show: true
        series:
          - entity: sensor.h3x_energy_arbitrage_price_plan
            name: Price
            yaxis_id: price
            type: line
            curve: stepline
            color: "#1f77b4"
            data_generator: |
              const slots = entity.attributes.price_slots || [];
              return slots.flatMap((slot) => {
                const start = new Date(slot.start).getTime();
                const end = new Date(slot.end).getTime();
                const price = Number(slot.price);
                return [[start, price], [end, price]];
              });
          - entity: sensor.h3x_energy_arbitrage_price_plan
            name: Planned dispatch
            yaxis_id: power
            type: area
            curve: stepline
            color: "#2ca02c"
            opacity: 0.25
            data_generator: |
              const plan = entity.attributes.dispatch_plan || [];
              return plan.flatMap((slot) => {
                const start = new Date(slot.start).getTime();
                const end = new Date(slot.end).getTime();
                const kw = Number(slot.target_power_w || 0) / 1000;
                const signedKw = slot.action === "charge" ? -kw : kw;
                return [[start, signedKw], [end, signedKw]];
              });

      - type: markdown
        title: Next planned slots
        content: >
          {% set plan =
          state_attr('sensor.h3x_energy_arbitrage_price_plan', 'dispatch_plan')
          or [] %}

          | Start | Price | Action | kW | Est. value |
          |---|---:|---|---:|---:|
          {% for slot in plan[:16] %}
          | {{ slot.start[11:16] }} | {{ slot.price }} | {{ slot.action }} |
          {{ (slot.target_power_w / 1000) | round(1) }} | {{ slot.value }} |
          {% endfor %}

      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: true
          title: Battery power and SOC
          show_states: true
          colorize_states: true
        yaxis:
          - id: power
            decimals: 1
            apex_config:
              title:
                text: kW
          - id: soc
            opposite: true
            min: 0
            max: 100
            decimals: 0
            apex_config:
              title:
                text: SOC %
        apex_config:
          chart:
            height: 340
          tooltip:
            shared: true
        series:
          - entity: sensor.force_h3x_bridge_battery_power
            name: Battery power
            yaxis_id: power
            type: area
            color: "#ff7f0e"
            opacity: 0.2
            transform: return Number(x) / 1000;
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.force_h3x_bridge_battery_soc
            name: SOC
            yaxis_id: soc
            type: line
            color: "#9467bd"
            group_by:
              func: avg
              duration: 5min

      - type: history-graph
        title: Battery power history
        hours_to_show: 24
        entities:
          - entity: sensor.force_h3x_bridge_battery_power
            name: Battery power

      - type: history-graph
        title: Battery SOC history
        hours_to_show: 24
        entities:
          - entity: sensor.force_h3x_bridge_battery_soc
            name: Battery SOC

      - type: entities
        title: Force H3X controls
        show_header_toggle: false
        entities:
          - entity: select.force_h3x_bridge_ems_mode
            name: EMS mode
          - entity: number.force_h3x_bridge_charge_discharge_power_ref
            name: Charge/discharge reference
          - entity: number.force_h3x_bridge_charge_limit_soc
            name: Charge limit SOC
          - entity: number.force_h3x_bridge_discharge_limit_soc_eps
            name: Discharge limit SOC
          - entity: sensor.force_h3x_bridge_bms_temperature
            name: BMS temperature
          - entity: sensor.force_h3x_bridge_bms_soh
            name: BMS SOH

      - type: entities
        title: Arbitrage diagnostics
        show_header_toggle: false
        entities:
          - entity: sensor.h3x_energy_arbitrage_price_resolution
            name: Price resolution
          - entity: sensor.h3x_energy_arbitrage_price_slots_available
            name: Available slots
          - type: attribute
            entity: sensor.h3x_energy_arbitrage_decision
            attribute: next_slot_start
            name: Current slot start
          - type: attribute
            entity: sensor.h3x_energy_arbitrage_decision
            attribute: next_slot_end
            name: Current slot end
          - type: attribute
            entity: sensor.h3x_energy_arbitrage_decision
            attribute: updated_at
            name: Optimizer updated
          - type: attribute
            entity: sensor.h3x_energy_arbitrage_decision
            attribute: apply_error
            name: Last apply error
