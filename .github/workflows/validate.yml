name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install validation dependencies
        run: python -m pip install "pymodbus>=3.11.2"
      - name: Compile Python files
        run: python -m compileall custom_components extras tools
      - name: Validate Modbus write sequence
        run: python tools/validate_modbus_write_sequence.py
      - name: Validate number entity metadata
        run: python tools/validate_number_metadata.py
      - name: Validate JSON
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/force_h3x_bridge/manifest.json > /dev/null
          python -m json.tool custom_components/force_h3x_bridge/strings.json > /dev/null
          python -m json.tool custom_components/force_h3x_bridge/translations/en.json > /dev/null
